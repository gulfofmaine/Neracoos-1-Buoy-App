repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: "src/stories/__snapshots__/storyshots.spec.ts.snap"
        # exclude: tests/data
      - id: check-ast
      - id: check-yaml
        # exclude: services/config_gen/service_configs/data.neracoos.org_geoapi/pygeoapi.config.yaml
      - id: check-xml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: check-docstring-first
      - id: check-added-large-files
        args: ["--maxkb=600"]
        exclude: package-lock.json
      - id: no-commit-to-branch

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: "9337a74165b178ae2c766f60bee7252a0f06f3e8" # frozen: v3.9.5
    hooks:
      - id: prettier

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 64a97fb7fa63188393d3215c6e312f5f9c6d0f78 # frozen: v1.27.0
    hooks:
      - id: zizmor
        files: "^\\.github"
        args: [--persona=pedantic]

update:
  cooldown_days: 7
